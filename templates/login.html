<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Login</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }
    body {
    background-color: #f4f8ff;
    min-height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}
    .home-link {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #4f46e5;
    text-decoration: underline;
    font-weight: bold;
    font-size: 18px;
}

    .container {
        background-color: white;
        padding: 30px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        text-align: center;
    }
    h1 {
        color: #4f46e5;
        margin-bottom: 20px;
    }
    input {
        width: 70%;
        padding: 10px;
        margin-top: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
    }
    button {
        width: 100%;
        padding: 10px;
        margin-top: 20px;
        border: none;
        border-radius: 5px;
        background-color: #4f46e5;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }
    button:hover {
        background-color: #4338ca;
    }
    a {
        display: inline-block;
        margin-bottom: 20px;
        color: #4f46e5;
        text-decoration: none;
        font-weight: bold;
    }
    .error {
        color: red;
        margin-top: 15px;
    }
</style>
</head>
<body>
    <body>
    <a class="home-link" href="{% url 'home' %}">Home</a>

    <div class="container">
        <h1>Login</h1>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Enter Username">

            <input type="password" name="password" placeholder="Enter Password">

            <button type="submit">Login</button>

            {% if error %}
                <p class="error">{{ error }}</p>
            {% endif %}
        </form>
    </div>
</body>
</body>
</html>
